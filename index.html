<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Tafakkur | Muammo · Yechim · Ijod</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            overflow: hidden;
            font-family: 'Inter', 'Poppins', 'Segoe UI', system-ui, sans-serif;
            background: #02050c;
            height: 100vh;
            width: 100%;
        }

        /* ---------- ORQA FON KANVASI (faqat science linelar, aylanuvchi traektoriyalar) ---------- */
        #bgCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            display: block;
        }

        /* Asosiy kontent: minimal markaz, shaffof, faqat matn va tugma */
        .hero {
            position: relative;
            z-index: 20;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(1px);
            padding: 2rem;
        }

        .center-stage {
            max-width: 900px;
            width: 100%;
            text-align: center;
            background: rgba(5, 12, 22, 0.35);
            backdrop-filter: blur(16px);
            border-radius: 3.5rem;
            border: 1px solid rgba(0, 210, 255, 0.25);
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(0, 255, 200, 0.1) inset;
            padding: 3rem 2rem;
            animation: fadeUp 1s ease-out;
        }

        @keyframes fadeUp {
            0% { opacity: 0; transform: translateY(30px); backdrop-filter: blur(0px); }
            100% { opacity: 1; transform: translateY(0); backdrop-filter: blur(16px); }
        }

        /* asosiy sarlavha - mavzu markazi */
        .main-title {
            font-size: clamp(2rem, 7vw, 4.8rem);
            font-weight: 700;
            font-family: 'Space Grotesk', 'Inter', monospace;
            background: linear-gradient(130deg, #FFFFFF, #7DF9FF, #C084FC, #FF80BF);
            background-size: 300% 200%;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.02em;
            line-height: 1.2;
            margin-bottom: 1.2rem;
        }

        .sub-line {
            font-size: 1rem;
            letter-spacing: 6px;
            font-weight: 400;
            color: #8bcbff;
            text-transform: uppercase;
            background: rgba(0, 30, 40, 0.5);
            display: inline-block;
            padding: 0.4rem 1.5rem;
            border-radius: 60px;
            margin-bottom: 2rem;
            border: 0.5px solid rgba(0, 230, 250, 0.5);
            font-family: monospace;
            backdrop-filter: blur(4px);
        }

        .badge-lab {
            font-size: 0.7rem;
            letter-spacing: 3px;
            color: #5bc0ff;
            margin-bottom: 1rem;
            font-weight: 300;
        }

        /* Tugma - boshlash */
        .launch-area {
            margin-top: 2rem;
        }

        .prez-btn {
            background: linear-gradient(105deg, #001a2a, #09182c);
            border: 1.5px solid rgba(0, 255, 210, 0.8);
            padding: 1rem 3rem;
            font-size: 1.1rem;
            font-weight: 600;
            font-family: 'Space Grotesk', monospace;
            color: #ccf7ff;
            border-radius: 80px;
            backdrop-filter: blur(12px);
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.2, 1, 0.3, 1);
            text-transform: uppercase;
            letter-spacing: 3px;
            box-shadow: 0 0 12px rgba(0, 255, 255, 0.2);
        }

        .prez-btn:hover {
            background: linear-gradient(105deg, #063654, #102f46);
            border-color: #ff66cc;
            color: white;
            box-shadow: 0 0 28px #0ff, 0 0 15px #ff44aa;
            transform: scale(1.02);
        }

        .credit {
            position: absolute;
            bottom: 18px;
            left: 20px;
            font-size: 10px;
            opacity: 0.4;
            z-index: 30;
            font-family: monospace;
            background: rgba(0,0,0,0.3);
            padding: 4px 14px;
            border-radius: 20px;
            pointer-events: none;
            color: #99ccff;
        }

        @media (max-width: 680px) {
            .center-stage { padding: 2rem 1.2rem; border-radius: 2rem; }
            .prez-btn { padding: 0.8rem 2rem; font-size: 0.9rem; letter-spacing: 2px; }
            .sub-line { font-size: 0.7rem; letter-spacing: 3px; }
        }

        /* iframe overlay - to'liq ekran */
        .presentation-iframe-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000000dd;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.6s cubic-bezier(0.2, 0.9, 0.4, 1), visibility 0s linear 0.6s;
        }

        .presentation-iframe-layer.active {
            opacity: 1;
            visibility: visible;
            transition: opacity 0.6s cubic-bezier(0.2, 0.9, 0.4, 1);
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .close-iframe-btn {
            position: absolute;
            top: 1.8rem;
            right: 2rem;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid #ff5588;
            font-size: 1.6rem;
            width: 52px;
            height: 52px;
            border-radius: 50px;
            color: white;
            cursor: pointer;
            z-index: 1002;
            font-weight: bold;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
        }
        .close-iframe-btn:hover { background: #ff3366; transform: scale(1.05); border-color: white; }
    </style>
</head>
<body>

    <canvas id="bgCanvas"></canvas>

    <div class="hero">
        <div class="center-stage">
            <div class="badge-lab">✦ INTELLEKT · TARAQQIYOT ✦</div>
            <div class="main-title">
                Tafakkur, muammoni<br>hal qilish va ijodkorlik
            </div>
            <div class="sub-line">muammo → yechim → yaratuvchanlik</div>
            <div class="launch-area">
                <button class="prez-btn" id="startPresentationBtn">⟡ Boshlash ⟡</button>
            </div>
        </div>
    </div>
    <div class="credit">⚡ AI science linelar · doimiy aylanuvchi tarmoq | Tafakkur maydoni</div>

    <!-- iframe overlay -->
    <div id="presentationOverlay" class="presentation-iframe-layer">
        <button id="closePresentationBtn" class="close-iframe-btn">✕</button>
        <iframe id="presentationIframe" allow="clipboard-write; autoplay; fullscreen" allowfullscreen src="https://app.presentations.ai/view/wce6AwVb5i"></iframe>
    </div>

    <script>
        (function(){
            // ----------------------- ORQA FON: faqat science linelar, aylanuvchi geometrik to‘r, neyron iplar, yorug'lik traektoriyalari -----------------------
            const canvas = document.getElementById('bgCanvas');
            const ctx = canvas.getContext('2d');
            let w, h;
            let time = 0;
            
            // parametrlar: chiziqli tarmoq tugunlari
            let nodes = [];
            let connections = [];
            let flowLines = [];
            
            function resizeCanvas() {
                w = window.innerWidth;
                h = window.innerHeight;
                canvas.width = w;
                canvas.height = h;
                initScienceNetwork();
                initDynamicFlow();
            }
            
            // murakkab ilmiy tarmoq (node + edge) - doimiy yangilanadi
            function initScienceNetwork() {
                const nodeCount = Math.min(95, Math.floor(w * h / 9000) + 45);
                nodes = [];
                for(let i = 0; i < nodeCount; i++) {
                    nodes.push({
                        x: Math.random() * w,
                        y: Math.random() * h,
                        vx: (Math.random() - 0.5) * 0.25,
                        vy: (Math.random() - 0.5) * 0.2,
                        radius: 2 + Math.random() * 4,
                        color: `hsla(${180 + Math.random() * 70}, 80%, 65%, ${0.4 + Math.random() * 0.4})`
                    });
                }
                // ulanishlar indekslari asosida
                connections = [];
                for(let i = 0; i < nodes.length; i++) {
                    for(let j = i+1; j < nodes.length; j++) {
                        let dx = nodes[i].x - nodes[j].x;
                        let dy = nodes[i].y - nodes[j].y;
                        let dist = Math.hypot(dx, dy);
                        if(dist < 150) {
                            connections.push({ from: i, to: j, distMax: 150 });
                        }
                    }
                }
            }
            
            function initDynamicFlow() {
                flowLines = [];
                for(let i = 0; i < 30; i++) {
                    flowLines.push({
                        points: [],
                        t: Math.random() * Math.PI * 2,
                        speed: 0.008 + Math.random() * 0.015,
                        color: `hsla(${190 + Math.random() * 60}, 85%, 65%, 0.4)`
                    });
                }
            }
            
            // harakatlanuvchi tugunlar
            function updateNodes() {
                for(let n of nodes) {
                    n.x += n.vx;
                    n.y += n.vy;
                    if(n.x > w + 40) n.x = -40;
                    if(n.x < -40) n.x = w + 40;
                    if(n.y > h + 40) n.y = -40;
                    if(n.y < -40) n.y = h + 40;
                    // ozgina tebranish
                    n.vx += (Math.random() - 0.5) * 0.05;
                    n.vy += (Math.random() - 0.5) * 0.05;
                    let maxSpeed = 0.7;
                    if(n.vx > maxSpeed) n.vx = maxSpeed;
                    if(n.vx < -maxSpeed) n.vx = -maxSpeed;
                    if(n.vy > maxSpeed) n.vy = maxSpeed;
                    if(n.vy < -maxSpeed) n.vy = -maxSpeed;
                }
                // yangi ulanishlar (dinamik)
                connections = [];
                for(let i = 0; i < nodes.length; i++) {
                    for(let j = i+1; j < nodes.length; j++) {
                        let dx = nodes[i].x - nodes[j].x;
                        let dy = nodes[i].y - nodes[j].y;
                        let dist = Math.hypot(dx, dy);
                        if(dist < 165) {
                            connections.push({ from: i, to: j, distCurrent: dist });
                        }
                    }
                }
            }
            
            function drawScienceNet() {
                if(!ctx) return;
                // chizish ulanishlarni (science lines)
                for(let edge of connections) {
                    const p1 = nodes[edge.from];
                    const p2 = nodes[edge.to];
                    if(!p1 || !p2) continue;
                    let dx = p1.x - p2.x;
                    let dy = p1.y - p2.y;
                    let dist = Math.hypot(dx, dy);
                    let opacity = Math.max(0.08, 0.4 * (1 - dist / 180));
                    ctx.beginPath();
                    ctx.moveTo(p1.x, p1.y);
                    ctx.lineTo(p2.x, p2.y);
                    ctx.strokeStyle = `rgba(0, 210, 250, ${opacity * 0.8 + Math.sin(time)*0.05})`;
                    ctx.lineWidth = 1.2;
                    ctx.stroke();
                }
                
                // chizish tugunlarni ( luminous nodes )
                for(let n of nodes) {
                    ctx.beginPath();
                    ctx.arc(n.x, n.y, n.radius + Math.sin(time * 3 + n.x) * 0.5, 0, Math.PI*2);
                    ctx.fillStyle = n.color;
                    ctx.shadowBlur = 8;
                    ctx.shadowColor = "#0af";
                    ctx.fill();
                }
                ctx.shadowBlur = 0;
            }
            
            // aylanadigan spiral chiziqlar va to‘lqinlar (science/dna tipidagi)
            function drawWaveLines() {
                for(let i = 0; i < 12; i++) {
                    ctx.beginPath();
                    let offset = i * 35 + time * 1.2;
                    for(let x = 0; x <= w; x += 28) {
                        let y1 = h * 0.3 + Math.sin(x * 0.008 + offset) * 45 + Math.cos(x * 0.012 + time) * 18;
                        let y2 = h * 0.7 + Math.sin(x * 0.009 + offset + 2.1) * 48 + Math.sin(x * 0.018) * 15;
                        if(x === 0) {
                            ctx.moveTo(x, y1);
                        } else {
                            ctx.lineTo(x, y1);
                        }
                    }
                    ctx.strokeStyle = `rgba(0, 200, 250, 0.2)`;
                    ctx.lineWidth = 1.2;
                    ctx.stroke();
                    
                    // ikkinchi qator
                    ctx.beginPath();
                    for(let x = 0; x <= w; x += 30) {
                        let y2 = h * 0.6 + Math.sin(x * 0.01 + time * 1.5 + i) * 55 + Math.cos(x * 0.02 + i) * 20;
                        if(x === 0) ctx.moveTo(x, y2);
                        else ctx.lineTo(x, y2);
                    }
                    ctx.strokeStyle = `rgba(140, 100, 255, 0.2)`;
                    ctx.stroke();
                }
            }
            
            // aylanuvchi yorug'lik halqalari (orbital science)
            function drawRotatingRings() {
                const centerX = w/2;
                const centerY = h/2;
                for(let r = 0; r < 5; r++) {
                    let radius = 110 + r * 55 + Math.sin(time * 0.5) * 12;
                    ctx.beginPath();
                    for(let ang = 0; ang <= Math.PI * 2; ang += 0.08) {
                        let x = centerX + Math.cos(ang + time * 0.6) * radius;
                        let y = centerY + Math.sin(ang * 1.3 + time * 0.4) * (radius * 0.85);
                        if(ang === 0) ctx.moveTo(x, y);
                        else ctx.lineTo(x, y);
                    }
                    ctx.strokeStyle = `rgba(0, 210, 250, ${0.12 + Math.sin(time + r) * 0.05})`;
                    ctx.lineWidth = 1.5;
                    ctx.stroke();
                }
                
                // ikkinchi set - ellipslar
                for(let e = 0; e < 4; e++) {
                    ctx.beginPath();
                    let angleOff = time * 0.8 + e;
                    let radX = 190;
                    let radY = 110;
                    for(let ang = 0; ang <= 2 * Math.PI; ang += 0.1) {
                        let x = centerX + Math.cos(ang + angleOff) * radX;
                        let y = centerY + Math.sin(ang * 0.9 + angleOff) * radY;
                        if(ang === 0) ctx.moveTo(x, y);
                        else ctx.lineTo(x, y);
                    }
                    ctx.strokeStyle = `rgba(180, 100, 240, 0.2)`;
                    ctx.stroke();
                }
            }
            
            // dinamik particle oqimlari (harakatlanuvchi nuqtalar)
            let movingParticles = [];
            function initMovingParticles() {
                const pCount = 85;
                for(let i=0;i<pCount;i++) {
                    movingParticles.push({
                        x: Math.random() * w,
                        y: Math.random() * h,
                        angle: Math.random() * Math.PI * 2,
                        speed: 0.5 + Math.random() * 1.2,
                        radius: 1.5 + Math.random() * 2.8,
                        color: `hsl(${180 + Math.random() * 80}, 90%, 65%)`
                    });
                }
            }
            
            function updateParticles() {
                for(let p of movingParticles) {
                    let dirX = Math.cos(p.angle);
                    let dirY = Math.sin(p.angle);
                    p.x += dirX * p.speed * 0.35;
                    p.y += dirY * p.speed * 0.35;
                    if(p.x > w + 40) p.x = -40;
                    if(p.x < -40) p.x = w + 40;
                    if(p.y > h + 40) p.y = -40;
                    if(p.y < -40) p.y = h + 40;
                    // ozgina yo'nalish o'zgarishi
                    if(Math.random() < 0.02) p.angle += (Math.random() - 0.5) * 0.7;
                }
            }
            
            function drawParticles() {
                for(let p of movingParticles) {
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.radius * 0.8, 0, Math.PI*2);
                    ctx.fillStyle = p.color;
                    ctx.shadowBlur = 6;
                    ctx.fill();
                }
                ctx.shadowBlur = 0;
            }
            
            // Murakkab grid tizim (science data lines)
            function drawComplexGrid() {
                let step = 65;
                ctx.lineWidth = 0.8;
                for(let i = 0; i < w / step; i++) {
                    let xLine = i * step + Math.sin(time * 0.5 + i) * 8;
                    ctx.beginPath();
                    ctx.moveTo(xLine, 0);
                    ctx.lineTo(xLine + Math.sin(time) * 12, h);
                    ctx.strokeStyle = `rgba(0, 190, 220, 0.12)`;
                    ctx.stroke();
                }
                for(let j = 0; j < h / step; j++) {
                    let yLine = j * step + Math.cos(time * 0.7 + j) * 10;
                    ctx.beginPath();
                    ctx.moveTo(0, yLine);
                    ctx.lineTo(w, yLine + Math.sin(time * 0.9) * 12);
                    ctx.stroke();
                }
            }
            
            // asosiy animatsiya (faqat science linelar aylanadi, hech qanday rasm yoki ism)
            function animateScience() {
                if(!ctx) return;
                ctx.clearRect(0, 0, w, h);
                // chuqur kosmik background (qorong'u)
                let grad = ctx.createLinearGradient(0, 0, w, h);
                grad.addColorStop(0, '#030711');
                grad.addColorStop(1, '#051a2a');
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, w, h);
                
                drawComplexGrid();
                drawScienceNet();        // neuron tarmoq + ulanishlar
                drawWaveLines();         // to'lqinli ilmiy chiziqlar
                drawRotatingRings();     // aylanuvchi orbitalar
                drawParticles();         // oqayotgan zarralar
                
                // qo'shimcha yorug'lik chiziqlari (lazer nurlari)
                for(let i=0;i<14;i++) {
                    let angleRay = time * 0.5 + i;
                    let xStart = w/2 + Math.cos(angleRay) * 40;
                    let yStart = h/2 + Math.sin(angleRay*1.2) * 40;
                    let xEnd = w/2 + Math.cos(angleRay + 1.4) * 210;
                    let yEnd = h/2 + Math.sin(angleRay*0.9 + 0.9) * 190;
                    ctx.beginPath();
                    ctx.moveTo(xStart, yStart);
                    ctx.lineTo(xEnd, yEnd);
                    ctx.strokeStyle = `rgba(70, 180, 250, 0.18)`;
                    ctx.lineWidth = 1;
                    ctx.stroke();
                }
                
                updateNodes();
                updateParticles();
                time += 0.022;
                requestAnimationFrame(animateScience);
            }
            
            // ishga tushirish
            window.addEventListener('resize', () => {
                resizeCanvas();
                initMovingParticles();
            });
            resizeCanvas();
            initScienceNetwork();
            initMovingParticles();
            animateScience();
            
            // ---------- PREZENTATSIYA OCHISH (faqat tugma bilan) ----------
            const overlayDiv = document.getElementById('presentationOverlay');
            const openBtn = document.getElementById('startPresentationBtn');
            const closePresBtn = document.getElementById('closePresentationBtn');
            const iframePres = document.getElementById('presentationIframe');
            
            function openFullscreenPres() {
                if(overlayDiv.classList.contains('active')) return;
                overlayDiv.classList.add('active');
                document.body.style.overflow = 'hidden';
                if(!iframePres.src.includes('app.presentations.ai')) {
                    iframePres.src = 'https://app.presentations.ai/view/wce6AwVb5i';
                }
            }
            
            function closePresentation() {
                overlayDiv.classList.remove('active');
                document.body.style.overflow = '';
            }
            
            openBtn.addEventListener('click', openFullscreenPres);
            closePresBtn.addEventListener('click', closePresentation);
            window.addEventListener('keydown', (e) => {
                if(e.key === 'Escape' && overlayDiv.classList.contains('active')) {
                    closePresentation();
                }
            });
            
            // HECH QANDAY ISMLAR YOKI AVATARLAR YO'Q. Faqat matn va tugma + background science lines
            // orqa fon faqat AI shakllar (aylanuvchi chiziqlar, tarmoqlar, partikllar) - rasm yoki keraksiz narsalar yo'q
        })();
    </script>
</body>
</html>
