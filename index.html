<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Prezentatsiya | Dahshatli Zamonaviy Interfeys</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: radial-gradient(circle at 20% 30%, #0a0f1e, #03060c);
            font-family: 'Poppins', 'Segoe UI', system-ui, -apple-system, 'Inter', sans-serif;
        }

        /* Asosiy boshlang'ich ekran - fullscreen dahshatli zamonaviy dizayn */
        .intro-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1000;
            background: radial-gradient(ellipse at 40% 50%, #0e1a2b, #02040c);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(2px);
            transition: opacity 0.8s cubic-bezier(0.23, 1, 0.32, 1), visibility 0s linear 0.8s;
            opacity: 1;
            visibility: visible;
            overflow: hidden;
        }

        /* yashirish effekti */
        .intro-screen.hide {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        /* dinamik fon animatsiyalari - 'dahshatli' effektlar */
        .dynamic-bg {
            position: absolute;
            width: 200%;
            height: 200%;
            top: -50%;
            left: -50%;
            background: repeating-linear-gradient(
                45deg,
                rgba(255, 0, 100, 0.05) 0px,
                rgba(255, 0, 100, 0.05) 2px,
                rgba(0, 255, 255, 0.02) 2px,
                rgba(0, 255, 255, 0.02) 8px
            );
            animation: shiftGrid 14s linear infinite;
            z-index: 0;
            pointer-events: none;
        }

        @keyframes shiftGrid {
            0% { transform: translate(0, 0) rotate(0deg); }
            100% { transform: translate(40px, 40px) rotate(2deg); }
        }

        /* qo'shimcha chaqmoq nuri effekti */
        .glitch-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-radial-gradient(circle at 20% 30%, rgba(255, 0, 150, 0.1), rgba(0, 200, 255, 0.05) 80px);
            mix-blend-mode: overlay;
            pointer-events: none;
            z-index: 1;
            animation: pulseGlitch 3s infinite alternate;
        }

        @keyframes pulseGlitch {
            0% { opacity: 0.3; }
            100% { opacity: 0.7; background-position: 10% 20%;}
        }

        /* asosiy kontent markaz */
        .content-center {
            position: relative;
            z-index: 20;
            text-align: center;
            padding: 2rem;
            transform: translateY(-5%);
            animation: floatIn 1.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        @keyframes floatIn {
            0% {
                opacity: 0;
                transform: translateY(40px) scale(0.96);
                filter: blur(10px);
            }
            100% {
                opacity: 1;
                transform: translateY(-5%) scale(1);
                filter: blur(0);
            }
        }

        /* Mavzu: brutalist neon */
        .theme-title {
            font-size: clamp(2.5rem, 12vw, 5.5rem);
            font-weight: 900;
            background: linear-gradient(135deg, #ff2a6d, #05d9e8, #ffea00);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-transform: uppercase;
            letter-spacing: 6px;
            margin-bottom: 2rem;
            text-shadow: 0 0 12px rgba(255, 42, 109, 0.5);
            animation: textGradientShift 4s ease infinite, glitchText 2s infinite;
        }

        @keyframes textGradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes glitchText {
            0% { text-shadow: -2px 0 red, 2px 0 cyan; opacity: 0.9; }
            2% { text-shadow: 2px 0 red, -2px 0 cyan; }
            4% { text-shadow: 0px 0px red, 0px 0px cyan; }
            96% { text-shadow: 0px 0px rgba(255,42,109,0.5); }
            100% { text-shadow: 1px 0 rgba(255,42,109,0.3), -1px 0 cyan; }
        }

        /* ism kartalari - zamonaviy, dahshatli 3D hover */
        .names-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 2.5rem;
            margin: 2.8rem 0;
            perspective: 800px;
        }

        .name-card {
            background: rgba(10, 20, 30, 0.55);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 255, 255, 0.5);
            border-radius: 32px;
            padding: 1rem 2.5rem;
            font-size: clamp(1.6rem, 6vw, 2.8rem);
            font-weight: 700;
            letter-spacing: 2px;
            color: #ffebf0;
            text-transform: uppercase;
            transition: all 0.4s cubic-bezier(0.2, 1.2, 0.3, 1);
            box-shadow: 0 0 15px rgba(5, 217, 232, 0.3);
            transform-style: preserve-3d;
            cursor: default;
            background: linear-gradient(145deg, rgba(0, 20, 40, 0.7), rgba(0, 0, 0, 0.5));
            border-top: 2px solid #ff2a6d;
            border-left: 2px solid #ff2a6d;
        }

        .name-card:hover {
            transform: translateZ(30px) rotateX(5deg) scale(1.07);
            border-color: #05d9e8;
            box-shadow: 0 20px 40px rgba(0, 230, 250, 0.5), 0 0 25px rgba(255, 42, 109, 0.6);
            background: rgba(0, 0, 0, 0.75);
            color: #ffffff;
            text-shadow: 0 0 8px cyan;
            transition: 0.2s;
        }

        /* har bir ism alohida animatsiya */
        .name-card:nth-child(1) {
            animation: slideInLeft 0.9s ease-out 0.2s both;
        }
        .name-card:nth-child(2) {
            animation: slideInUp 0.9s ease-out 0.4s both;
        }
        .name-card:nth-child(3) {
            animation: slideInRight 0.9s ease-out 0.6s both;
        }

        @keyframes slideInLeft {
            from {
                opacity: 0;
                transform: translateX(-80px) rotateY(-20deg);
                filter: blur(6px);
            }
            to {
                opacity: 1;
                transform: translateX(0) rotateY(0);
                filter: blur(0);
            }
        }
        @keyframes slideInUp {
            from {
                opacity: 0;
                transform: translateY(70px) scale(0.9);
                filter: blur(5px);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
                filter: blur(0);
            }
        }
        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(80px) rotateY(20deg);
                filter: blur(6px);
            }
            to {
                opacity: 1;
                transform: translateX(0) rotateY(0);
                filter: blur(0);
            }
        }

        /* boshlash tugmasi - dahshatli zamonaviy */
        .start-btn {
            margin-top: 2rem;
            background: linear-gradient(90deg, #ff2a6d, #b30086, #05d9e8);
            background-size: 200%;
            border: none;
            padding: 1rem 3rem;
            font-size: 1.6rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: white;
            border-radius: 60px;
            cursor: pointer;
            transition: 0.25s;
            position: relative;
            z-index: 30;
            box-shadow: 0 0 15px #ff2a6d, 0 8px 25px rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            font-family: 'Poppins', monospace;
            animation: btnPulse 1.5s infinite alternate;
            border: 1px solid rgba(255,255,255,0.3);
        }

        @keyframes btnPulse {
            0% {
                box-shadow: 0 0 5px #ff2a6d, 0 0 10px #05d9e8;
                transform: scale(1);
            }
            100% {
                box-shadow: 0 0 28px #ff2a6d, 0 0 35px #05d9e8, 0 8px 20px black;
                transform: scale(1.02);
            }
        }

        .start-btn:hover {
            background-position: 100%;
            transform: scale(1.05);
            letter-spacing: 6px;
            box-shadow: 0 0 35px #ff2a6d, 0 0 25px cyan;
            transition: all 0.2s;
        }

        .start-btn:active {
            transform: scale(0.98);
        }

        /* iframe konteyner - avval yashirin, keyin ko'rinadi */
        .presentation-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 500;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.9s cubic-bezier(0.2, 0.9, 0.3, 1.2), visibility 0s linear 0.9s;
            background: #000;
        }

        .presentation-container.active {
            opacity: 1;
            visibility: visible;
            transition: opacity 0.9s cubic-bezier(0.2, 0.9, 0.3, 1.2);
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        /* yuklanish satri boshlang'ich ekranda ham, lekin iframe yuklanganda yo'qoladi */
        .loading-bar {
            position: fixed;
            top: 0;
            left: 0;
            width: 0%;
            height: 4px;
            background: linear-gradient(90deg, #ff2a6d, #05d9e8, #ffea00);
            z-index: 2000;
            transition: width 0.3s ease;
            box-shadow: 0 0 8px cyan;
            pointer-events: none;
        }

        /* qo'shimcha chaqmoq & neon nurlar */
        .corner-bling {
            position: absolute;
            bottom: 20px;
            right: 20px;
            color: rgba(5, 217, 232, 0.4);
            font-size: 12px;
            font-family: monospace;
            z-index: 50;
            background: rgba(0,0,0,0.5);
            padding: 5px 10px;
            border-radius: 20px;
            backdrop-filter: blur(3px);
            pointer-events: none;
        }

        /* Adaptiv dizayn */
        @media (max-width: 700px) {
            .names-container {
                gap: 1rem;
                flex-direction: column;
                align-items: center;
            }
            .name-card {
                padding: 0.6rem 1.8rem;
                font-size: 1.7rem;
            }
            .theme-title {
                letter-spacing: 3px;
            }
            .start-btn {
                padding: 0.8rem 2rem;
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>

    <!-- Yuklanish progress chizig'i (ixtiyoriy animatsiya) -->
    <div class="loading-bar" id="loadingBar"></div>

    <!-- DAHSHATLI FULL EKRAN INTRO (3 ta ism + mavzu) -->
    <div class="intro-screen" id="introScreen">
        <div class="dynamic-bg"></div>
        <div class="glitch-overlay"></div>
        
        <div class="content-center">
            <div class="theme-title">
                🧠 KIBER <span style="color:#ff2a6d">PREZENT</span> <br> 🚀
            </div>
            <!-- 3 ta ism talabga ko'ra - bu erda zamonaviy ismlar -->
            <div class="names-container">
                <div class="name-card">JASURBEK</div>
                <div class="name-card">MADINA</div>
                <div class="name-card">TIMUR</div>
            </div>
            <!-- Sarlavha ostida qo'shimcha mavzu yoki shior, animatsiyalar bilan -->
            <div style="margin-top: 0.5rem; font-size: 1rem; font-weight: 500; letter-spacing: 2px; background: linear-gradient(45deg, #ffffff80, #05d9e880); -webkit-background-clip: text; background-clip: text; color: transparent;">
                ✦ NEON VISION | FUTURISTIK SLIDES ✦
            </div>
            <button class="start-btn" id="startBtn">⚡ BOSHLASH ⚡</button>
        </div>
        <div class="corner-bling">// DAHŠATLI DIZAYN // ULTRA ANIMATION //</div>
    </div>

    <!-- Prezentatsiya iframe konteyneri (dastlab yashirin) -->
    <div class="presentation-container" id="presentationContainer">
        <iframe 
            id="presentationIframe"
            allow="clipboard-write; autoplay; fullscreen" 
            allowfullscreen 
            src="https://app.presentations.ai/view/wce6AwVb5i" 
            scrolling="no"
            title="Prezentatsiya slaydlari">
        </iframe>
    </div>

    <script>
        (function() {
            const introScreen = document.getElementById('introScreen');
            const presentationContainer = document.getElementById('presentationContainer');
            const startBtn = document.getElementById('startBtn');
            const loadingBar = document.getElementById('loadingBar');

            // loading bar faqat boshlang'ich ekranda chiroyli bo'lishi uchun (ixtiyoriy animatsiya)
            // uni to'liq yuklab olish effekti uchun ishlatamiz, lekin asosiy iframe yuklanganda ham emulyatsiya qilamiz.
            
            // Agar foydalanuvchi oldindan iframe ni yuklashni boshlasa, bar animatsiyasini to'ldiramiz.
            let iframeLoaded = false;
            const iframe = document.getElementById('presentationIframe');

            // funksiya: intro ni yashirish va prezentatsiyani ko'rsatish
            function startPresentation() {
                // agar allaqachon boshlangan bo'lsa qayta ishga tushirmaslik
                if (presentationContainer.classList.contains('active')) return;

                // loading bar animatsiyasi (tugma bosilganda to'ldirib, keyin yo'qoladi)
                loadingBar.style.width = '30%';
                
                // iframe yuklanishini kuzatish yoki to'g'ridan to'g'ri ko'rinish
                // Birinchi navbatda container active qilishdan oldin iframe mavjud bo'ladi, lekin biz extremal effekt uchun:
                // agar iframe hali to'liq yuklanmagan bo'lsa, loading bar to'liq bo'lganda intro ni o'chiramiz.
                // Ammo amaliyotda, iframe tezda yuklanadi. Shunchaki bar ni 100% ga yetkazib keyin o'tish.
                
                let progress = 30;
                const interval = setInterval(() => {
                    if (progress < 90) {
                        progress += 12;
                        loadingBar.style.width = progress + '%';
                    } else if (progress >= 90 && progress < 100) {
                        progress = 100;
                        loadingBar.style.width = '100%';
                        clearInterval(interval);
                        // 100% ga yetgach, darhol o'tish
                        performTransition();
                    }
                }, 60);
                
                // xavfsizlik uchun 1.5 sekunddan keyin majburan o'tish (agar intervalda muammo bo'lsa)
                setTimeout(() => {
                    if (!presentationContainer.classList.contains('active')) {
                        clearInterval(interval);
                        loadingBar.style.width = '100%';
                        performTransition();
                    }
                }, 1000);
                
                function performTransition() {
                    // intro screen ni yashirish
                    introScreen.classList.add('hide');
                    // presentation konteynerni faollashtirish
                    presentationContainer.classList.add('active');
                    
                    // 0.5 sekunddan keyin loading barni tozalaymiz (fade out)
                    setTimeout(() => {
                        loadingBar.style.width = '0%';
                        loadingBar.style.opacity = '0';
                    }, 600);
                    
                    // qo'shimcha: iframe ga fokus berish yoki fullscreen so'rov uchun imkoniyat 
                    try {
                        iframe.focus();
                    } catch(e) {}
                    
                    // slaydni to'liq ekranga chiqarish imkoniyati: foydalanuvchi tugma bilan yoki avtomatik kerak emas.
                }
            }
            
            // Tugma bosilganda boshlash
            startBtn.addEventListener('click', startPresentation);
            
            // Klaviaturadan Enter yoki Space bilan ham boshlash mumkin (UX)
            window.addEventListener('keydown', function(e) {
                if (e.code === 'Space' || e.code === 'Enter') {
                    if (!presentationContainer.classList.contains('active') && introScreen && !introScreen.classList.contains('hide')) {
                        e.preventDefault();
                        startPresentation();
                    }
                }
            });
            
            // agar iframe yuklanishda xatolik bo'lsa ham, lekin boshqaruv ishlaydi.
            // Ixtiyoriy: oldindan iframe yuklanishini boshlash - UI yaxshiroq bo'lishi uchun
            // sahifa yuklanganda iframe ni oldindan yuklab qo'yish (lekin ko'rinmaydi), bu tezroq ochilishiga sabab bo'ladi.
            // Bunda iframe src ni shu holatda (allaqachon mavjud). Buning uchun hech narsa qilish shart emas, chunki iframe startda mavjud.
            // Lekin brauzer faqat container active bo'lganda render qiladi. Ammo yaxshisi presentatsiya container ni "active" bo'lishidan oldin 
            // src ni o'zida saqlaydi, lekin visibility hidden da yuklanmaydi? Zamonaviy brauzerlar hidden container ichidagi iframe yuklanishi mumkin.
            // Bu yerga hech qanday muammo yo'q. 
            
            // Qo'shimcha effekt: agar foydalanuvchi slaydni tamomlagach, "orqaga" qaytish imkoniyati yo'q, lekin bu talab emas.
            // Chaqqonlik uchun agar foydalanuvchi slaydlar orasida noto'g'ri bosish bo'lsa hechqisi yo'q.
            
            // Va nihoyat, 'dahshatli' vizual effektlarni mustahkamlash, shuningdek ekran o'lchami o'zgarishida iframe moslashadi
            window.addEventListener('resize', () => {
                if(presentationContainer.classList.contains('active')) {
                    // iframe ni yangilashga hojat yo'q, CSS 100% allaqachon
                }
            });
            
            // Shuningdek, agar presentation iframe to'liq ekran rejimini qo'llab-quvvatlasa, allowfullscreen bilan.
            // mobil qurilmalarda scroll yo'q.
            document.body.style.overflow = 'hidden';
            
            // chiroyli preloader effekti bir marta sahifa yuklanganda loading barni 0 da ushlab turamiz
            setTimeout(() => {
                if(!presentationContainer.classList.contains('active')) {
                    loadingBar.style.width = '0%';
                }
            }, 200);
            
            // qo'shimcha: intro ekranidagi ismlar hover effekti neon porlash uchun uchqun
            // va theme_title ustida qo'shimcha animatsiya
            console.log("Dahshatli prezentatsiya tayyor | 3 ta ism + zamonaviy effektlar | Boshlash tugmasi ishlaydi");
        })();
    </script>
</body>
</html>
