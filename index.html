
<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prezentatsiya</title>
    <style>
        /* Ekrandagi barcha standart bo'shliqlarni olib tashlash */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden; /* Skrollni berkitish */
            background-color: #f4f7f9;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Iframe-ni butun ekranga yoyish */
        .container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Yuklanish vaqtidagi dizayn (ixtiyoriy) */
        .loading-bar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(to right, #007bff, #00d4ff);
            z-index: 9999;
        }
    </style>
</head>
<body>

    <div class="loading-bar"></div>

    <div class="container">
        <iframe 
            allow="clipboard-write; autoplay" 
            allowfullscreen 
            src="https://app.presentations.ai/view/wce6AwVb5i" 
            scrolling="no">
        </iframe>
    </div>

</body>
</html>
