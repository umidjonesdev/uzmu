<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>NeoMind AI | Tafakkur · Muammo · Ijodkorlik</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #050b12;
            font-family: 'Space Grotesk', 'Inter', 'Segoe UI', system-ui, -apple-system, 'Plus Jakarta Sans', monospace;
            overflow: hidden;
            height: 100vh;
            color: #eef5ff;
        }

        /* ---------- KANVAS ORQA FONDAGI AI HARAKATLAR ---------- */
        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            display: block;
            background: radial-gradient(circle at 30% 20%, #0a1428, #010101);
        }

        /* asosiy kontent - zamonaviy, antiqa detallar bilan */
        .hero {
            position: relative;
            z-index: 10;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(2px);
            padding: 2rem;
        }

        /* glassmorphism + antiqa ramka */
        .card {
            background: rgba(8, 18, 28, 0.58);
            backdrop-filter: blur(16px);
            border-radius: 64px;
            border: 1px solid rgba(0, 255, 255, 0.25);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(0, 255, 255, 0.1) inset;
            padding: 3rem 2.5rem;
            width: 90%;
            max-width: 1300px;
            transition: all 0.4s;
            animation: fadeGlow 2s ease-out;
        }

        @keyframes fadeGlow {
            0% { opacity: 0; transform: scale(0.96); box-shadow: 0 0 0 rgba(0,255,255,0); }
            100% { opacity: 1; transform: scale(1); box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
        }

        /* typing mavzu */
        .topic-area {
            text-align: center;
            margin-bottom: 3rem;
            border-bottom: 1px dashed rgba(0, 230, 250, 0.4);
            padding-bottom: 1.5rem;
        }

        .pre-title {
            font-size: 0.85rem;
            letter-spacing: 6px;
            text-transform: uppercase;
            background: linear-gradient(135deg, #7df9ff, #5f9eff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-weight: 500;
            margin-bottom: 1rem;
        }

        .typing-wrapper {
            font-size: clamp(1.8rem, 6vw, 3.4rem);
            font-weight: 700;
            display: inline-block;
            font-family: 'Space Mono', 'Fira Code', monospace;
        }

        #dynamic-topic {
            background: linear-gradient(120deg, #ffffff, #a0f0ff, #7aa2ff);
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-weight: 800;
            border-right: 3px solid #0ff;
            padding-right: 5px;
            animation: blinkCursor 0.8s infinite;
        }

        @keyframes blinkCursor {
            0%, 100% { border-color: #0ff; }
            50% { border-color: transparent; }
        }

        /* antiqa / nostalik detallari: statik qora oq plyonka effekti */
        .static-noise {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background: repeating-radial-gradient(circle at 20% 30%, rgba(0,0,0,0.2), rgba(255,255,255,0.02) 2px);
            z-index: 5;
            opacity: 0.2;
            mix-blend-mode: overlay;
        }

        /* 5 ta ism uchun modern grid (AI + antiqa) */
        .names-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 1.8rem;
            margin: 2rem 0 2rem;
        }

        .name-chip {
            background: rgba(0, 20, 40, 0.65);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(0, 255, 200, 0.5);
            border-radius: 60px;
            padding: 0.9rem 2rem;
            font-size: 1.5rem;
            font-weight: 600;
            font-family: 'Space Grotesk', monospace;
            letter-spacing: 1px;
            transition: all 0.25s cubic-bezier(0.2, 1.2, 0.4, 1);
            color: #eef2ff;
            text-shadow: 0 0 6px rgba(0,230,250,0.5);
            cursor: default;
            transform-style: preserve-3d;
            box-shadow: 0 5px 12px rgba(0,0,0,0.3);
        }

        .name-chip:hover {
            transform: translateY(-6px) scale(1.02);
            border-color: #ff55cc;
            box-shadow: 0 0 22px #0ff3, 0 10px 20px black;
            background: rgba(0, 0, 0, 0.7);
            color: #fff;
            text-shadow: 0 0 10px cyan;
        }

        /* ism maydonlari uchun turli xil animatsiyalar */
        .name-chip:nth-child(1) { animation: floatName 3s infinite ease-in-out 0s; }
        .name-chip:nth-child(2) { animation: floatName 3.4s infinite ease-in-out 0.2s; }
        .name-chip:nth-child(3) { animation: floatName 2.8s infinite ease-in-out 0.4s; }
        .name-chip:nth-child(4) { animation: floatName 3.2s infinite ease-in-out 0.6s; }
        .name-chip:nth-child(5) { animation: floatName 3.6s infinite ease-in-out 0.8s; }

        @keyframes floatName {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-5px); }
            100% { transform: translateY(0px); }
        }

        /* tugma / boshlash elementlari (antiqa + zamonaviy) */
        .action-area {
            display: flex;
            justify-content: center;
            margin-top: 2rem;
        }

        .enter-btn {
            background: linear-gradient(95deg, #000000aa, #0a1a2eaa);
            border: 1.5px solid #0ff;
            padding: 0.9rem 2.4rem;
            font-size: 1.2rem;
            font-weight: 600;
            font-family: monospace;
            letter-spacing: 2px;
            color: #b5ffff;
            border-radius: 60px;
            backdrop-filter: blur(12px);
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 0 10px rgba(0,255,255,0.2);
            text-transform: uppercase;
        }

        .enter-btn:hover {
            background: #0ff22a30;
            border-color: #ff66cc;
            color: white;
            box-shadow: 0 0 25px #0ff, 0 0 10px #f0f;
            transform: scale(1.02);
            letter-spacing: 3px;
        }

        /* qo'shimcha orqa fonda AI partikllar uchun canvas joy */
        .info-note {
            position: absolute;
            bottom: 18px;
            right: 24px;
            font-size: 11px;
            opacity: 0.4;
            font-family: monospace;
            z-index: 20;
            background: rgba(0,0,0,0.4);
            padding: 4px 12px;
            border-radius: 20px;
            backdrop-filter: blur(4px);
            letter-spacing: 1px;
        }

        @media (max-width: 780px) {
            .card {
                padding: 1.8rem 1.2rem;
                border-radius: 32px;
            }
            .name-chip {
                padding: 0.5rem 1.2rem;
                font-size: 1rem;
            }
            .typing-wrapper {
                font-size: 1.4rem;
            }
        }

        /* Glitch effekt antiqa */
        .glitch-text {
            position: relative;
        }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>
    <div class="static-noise"></div>

    <div class="hero">
        <div class="card">
            <div class="topic-area">
                <div class="pre-title">✦ NEURO·CREATIVE ✦  INTELLEKT  ✦</div>
                <div class="typing-wrapper">
                    <span id="dynamic-topic"></span>
                </div>
                <div style="margin-top: 1rem; font-size: 0.85rem; letter-spacing: 1px; opacity: 0.7; font-family: monospace;">
                    ⚡ tafakkur | muammoni hal qilish | ijodkorlik ⚡
                </div>
            </div>

            <!-- 5 ta ism joy ajratilgan -->
            <div class="names-grid">
                <div class="name-chip">SARDOR</div>
                <div class="name-chip">ELINA</div>
                <div class="name-chip">BEKZOD</div>
                <div class="name-chip">ROBBIE</div>
                <div class="name-chip">LAYLO</div>
            </div>

            <div class="action-area">
                <button class="enter-btn" id="launchPresentation">⟁ PREZENTATSIYANI OCHISH ⟁</button>
            </div>
        </div>
    </div>
    <div class="info-note">⚡ AI generative field | antiq·wave | neural drift ⚡</div>

    <!-- iframe konteyneri (dastlab yashirin, to'liq ekranga chiqadi) -->
    <div id="presentationOverlay" style="position: fixed; top:0; left:0; width:100%; height:100%; z-index:1000; background:#000; visibility: hidden; opacity:0; transition: all 0.8s cubic-bezier(0.23,1,0.32,1);">
        <iframe id="presFrame" style="width:100%; height:100%; border:none;" allowfullscreen allow="clipboard-write; autoplay" src="https://app.presentations.ai/view/wce6AwVb5i"></iframe>
        <button id="closePresentation" style="position: absolute; top: 20px; right: 30px; background: #ff3366; border: none; color: white; font-size: 28px; width: 48px; height: 48px; border-radius: 50%; cursor: pointer; backdrop-filter: blur(10px); z-index:1002; font-weight: bold; box-shadow: 0 0 20px black;">✕</button>
    </div>

    <script>
        (function() {
            // ---------- ORQA FONDAGI AI HARAKATLAR (advanced canvas + zarralar / oqimlar) ----------
            const canvas = document.getElementById('bg-canvas');
            const ctx = canvas.getContext('2d');
            let width, height;
            let particles = [];
            let wavePoints = [];
            
            // antiqa + futuristik: ranglar sxemasi
            const COLORS = ['#0ff', '#2ad4ff', '#ff44cc', '#7df9ff', '#3a6ea5', '#b967ff'];
            
            function resizeCanvas() {
                width = window.innerWidth;
                height = window.innerHeight;
                canvas.width = width;
                canvas.height = height;
                initParticles();
                initWave();
            }
            
            function initParticles() {
                const particleCount = Math.min(140, Math.floor(width * height / 9000));
                particles = [];
                for (let i = 0; i < particleCount; i++) {
                    particles.push({
                        x: Math.random() * width,
                        y: Math.random() * height,
                        radius: Math.random() * 3 + 1.2,
                        vx: (Math.random() - 0.5) * 0.4,
                        vy: (Math.random() - 0.5) * 0.2 + (Math.random() > 0.7 ? 0.1 : -0.1),
                        alpha: Math.random() * 0.6 + 0.2,
                        color: COLORS[Math.floor(Math.random() * COLORS.length)],
                        pulse: Math.random() * Math.PI * 2,
                    });
                }
            }
            
            function initWave() {
                wavePoints = [];
                for (let i = 0; i <= 100; i++) {
                    wavePoints.push({
                        x: (i / 100) * width,
                        y: height * 0.7 + Math.sin(i * 0.2) * 30,
                        baseY: height * 0.7,
                        speed: 0.02,
                        amp: 25
                    });
                }
            }
            
            let time = 0;
            let mouseX = width/2, mouseY = height/2;
            window.addEventListener('mousemove', (e) => {
                mouseX = e.clientX;
                mouseY = e.clientY;
            });
            
            function drawWave() {
                if(!wavePoints.length) return;
                ctx.beginPath();
                let first = true;
                for (let i = 0; i < wavePoints.length; i++) {
                    const pt = wavePoints[i];
                    const newY = pt.baseY + Math.sin(time * 1.8 + i * 0.07) * pt.amp + Math.cos(time * 1.2 + i * 0.03) * 12;
                    const influenceX = mouseX / width;
                    const sway = Math.sin(time * 2 + i * 0.2) * 6 * influenceX;
                    const drawX = pt.x + sway * 0.5;
                    if(first) {
                        ctx.moveTo(drawX, newY);
                        first = false;
                    } else {
                        ctx.lineTo(drawX, newY);
                    }
                }
                ctx.strokeStyle = 'rgba(0, 210, 255, 0.35)';
                ctx.lineWidth = 2.5;
                ctx.stroke();
                // ikkinchi to‘lqin qizg‘ish
                ctx.beginPath();
                first = true;
                for (let i = 0; i < wavePoints.length; i++) {
                    const pt = wavePoints[i];
                    const newY = pt.baseY - 20 + Math.sin(time * 2.2 + i * 0.1) * 18;
                    const drawX = pt.x + Math.sin(time * 1.5 + i) * 5;
                    if(first) {
                        ctx.moveTo(drawX, newY);
                        first = false;
                    } else {
                        ctx.lineTo(drawX, newY);
                    }
                }
                ctx.strokeStyle = 'rgba(255, 80, 180, 0.25)';
                ctx.lineWidth = 1.8;
                ctx.stroke();
            }
            
            function drawParticles() {
                for (let p of particles) {
                    p.x += p.vx;
                    p.y += p.vy;
                    if (p.x < -20) p.x = width + 20;
                    if (p.x > width + 20) p.x = -20;
                    if (p.y < -20) p.y = height + 20;
                    if (p.y > height + 20) p.y = -20;
                    
                    // AI-trail effekti: pulsatsiya
                    const pulseVal = 0.5 + Math.sin(time * 3 + p.pulse) * 0.3;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.radius * (0.7 + pulseVal * 0.6), 0, Math.PI * 2);
                    ctx.fillStyle = p.color + Math.floor(p.alpha * 100).toString(16).padStart(2,'0');
                    ctx.fill();
                    // glow
                    ctx.shadowBlur = 6;
                    ctx.shadowColor = p.color;
                    ctx.fill();
                    ctx.shadowBlur = 0;
                }
            }
            
            function drawNeuralGrid() {
                const step = 50;
                ctx.beginPath();
                ctx.strokeStyle = 'rgba(0, 180, 200, 0.12)';
                ctx.lineWidth = 0.8;
                for (let x = 0; x < width; x += step) {
                    ctx.moveTo(x, 0);
                    ctx.lineTo(x + Math.sin(time * 0.5) * 4, height);
                    ctx.stroke();
                }
                for (let y = 0; y < height; y += step) {
                    ctx.moveTo(0, y);
                    ctx.lineTo(width, y + Math.cos(time * 0.7) * 4);
                    ctx.stroke();
                }
                // radial gradient
                let grad = ctx.createRadialGradient(mouseX, mouseY, 10, mouseX, mouseY, 200);
                grad.addColorStop(0, 'rgba(0,255,255,0.05)');
                grad.addColorStop(1, 'rgba(0,0,0,0)');
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, width, height);
            }
            
            function animateBackground() {
                if (!ctx) return;
                ctx.clearRect(0, 0, width, height);
                ctx.globalCompositeOperation = 'source-over';
                // fon qorong'i
                ctx.fillStyle = '#03060c';
                ctx.fillRect(0, 0, width, height);
                
                // AI-grid
                drawNeuralGrid();
                // oqim chiziqlari
                drawWave();
                // partikllar
                drawParticles();
                
                // qo'shimcha yorug'lik nuqtalari (AI effekt)
                for(let i = 0; i < 40; i++) {
                    let sx = (Math.sin(time * 0.7 + i) * 0.5 + 0.5) * width;
                    let sy = (Math.cos(time * 0.5 + i * 2) * 0.4 + 0.6) * height;
                    ctx.beginPath();
                    ctx.arc(sx, sy, 2, 0, Math.PI*2);
                    ctx.fillStyle = `rgba(100, 200, 255, ${0.2 + Math.sin(time + i)*0.1})`;
                    ctx.fill();
                }
                
                time += 0.018;
                requestAnimationFrame(animateBackground);
            }
            
            window.addEventListener('resize', () => {
                resizeCanvas();
            });
            resizeCanvas();
            animateBackground();
            
            // ----- TYPING ANIMATION (mavzu) -----
            const topicPhrases = [
                "Tafakkur, muammoni hal qilish va ijodkorlik",
                "Critical Thinking & Problem Solving",
                "Ijodiy intellekt | Creative AI",
                "Tafakkur asri | muammo → yechim",
                "Tafakkur · muammo · ijod"
            ];
            let phraseIndex = 0;
            let charIndex = 0;
            let isDeleting = false;
            const typedTextSpan = document.getElementById('dynamic-topic');
            
            function typeEffect() {
                const currentPhrase = topicPhrases[phraseIndex];
                if (isDeleting) {
                    typedTextSpan.innerText = currentPhrase.substring(0, charIndex - 1);
                    charIndex--;
                    if (charIndex === 0) {
                        isDeleting = false;
                        phraseIndex = (phraseIndex + 1) % topicPhrases.length;
                    }
                } else {
                    typedTextSpan.innerText = currentPhrase.substring(0, charIndex + 1);
                    charIndex++;
                    if (charIndex === currentPhrase.length) {
                        isDeleting = true;
                        setTimeout(() => {}, 1500);
                    }
                }
                let speed = isDeleting ? 40 : 80;
                if (!isDeleting && charIndex === currentPhrase.length) speed = 1800;
                else if (isDeleting) speed = 35;
                setTimeout(typeEffect, speed);
            }
            typeEffect();
            
            // ----- PREZENTATSIYA OCHISH (iframe to'liq ekran) -----
            const overlay = document.getElementById('presentationOverlay');
            const closeBtn = document.getElementById('closePresentation');
            const launchBtn = document.getElementById('launchPresentation');
            const iframeElement = document.getElementById('presFrame');
            
            function openFullPresentation() {
                // agar allaqachon ko'rinadigan bo'lsa qayta ochmaymiz
                if (overlay.style.visibility === 'visible') return;
                overlay.style.visibility = 'visible';
                overlay.style.opacity = '1';
                // iframe src ni yangilash (agar xohlasa, xuddi shu)
                if (iframeElement.src !== 'https://app.presentations.ai/view/wce6AwVb5i') {
                    iframeElement.src = 'https://app.presentations.ai/view/wce6AwVb5i';
                }
                document.body.style.overflow = 'hidden';
            }
            
            function closePresentation() {
                overlay.style.opacity = '0';
                overlay.style.visibility = 'hidden';
                document.body.style.overflow = '';
                // ichki iframe to'xtatilmaydi, lekin foydalanuvchi qayta ochganda ishlaydi
            }
            
            launchBtn.addEventListener('click', openFullPresentation);
            closeBtn.addEventListener('click', closePresentation);
            
            // Esc tugmasini bosganda yopish
            window.addEventListener('keydown', (e) => {
                if (e.key === 'Escape' && overlay.style.visibility === 'visible') {
                    closePresentation();
                }
                // Agar boshlash tugmasiga Enter bo'lsa ham ishlatish mumkin (ixtiyoriy)
                if (e.key === 'Enter' && launchBtn === document.activeElement) {
                    openFullPresentation();
                }
            });
            
            // canvas ustida to'liq interaktivlik
            // chiroyli hover effekt uchun ism maydonlariga ixtiyoriy tooltips
            const chips = document.querySelectorAll('.name-chip');
            chips.forEach((chip, idx) => {
                chip.setAttribute('data-tooltip', `🎓 ijodkor ishtirokchi ${idx+1}`);
                chip.style.cursor = 'pointer';
                chip.addEventListener('click', () => {
                    // kichik haptik: alert emas, balki konsol effekti yoki hech narsa (shunchaki dizayn)
                    console.log(`Ism tanlandi: ${chip.innerText} — tafakkur markazi`);
                });
            });
            
            // qo'shimcha antiqa + zamonaviy: vaqti-vaqti bilan canvasda o'zgaruvchi glitch
            setInterval(() => {
                if (Math.random() > 0.85 && overlay.style.visibility !== 'visible') {
                    const glitchCanvas = document.createElement('div');
                    glitchCanvas.style.position = 'fixed';
                    glitchCanvas.style.top = 0;
                    glitchCanvas.style.left = 0;
                    glitchCanvas.style.width = '100%';
                    glitchCanvas.style.height = '100%';
                    glitchCanvas.style.background = 'rgba(255,0,100,0.03)';
                    glitchCanvas.style.pointerEvents = 'none';
                    glitchCanvas.style.zIndex = '15';
                    glitchCanvas.style.mixBlendMode = 'screen';
                    document.body.appendChild(glitchCanvas);
                    setTimeout(() => glitchCanvas.remove(), 80);
                }
            }, 3800);
        })();
    </script>
</body>
</html>
